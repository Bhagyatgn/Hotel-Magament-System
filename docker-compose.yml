services:
  mysql:
    image: mysql:8.0
    container_name: hotel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: hotel_booking
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro

  backend:
    build: ./backend
    container_name: hotel_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: admin123
      DB_NAME: hotel_booking
      JWT_SECRET: mySuperSecretKey123
    depends_on:
      - mysql
    ports:
      - "5000:5000"

  frontend:
    build: ./hotel-booking-frontend
    container_name: hotel_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mysql_data: